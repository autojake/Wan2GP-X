name: Sync Upstream (Mirror & Merge)

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:   # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Mirror Branch
        run: |
          git remote add upstream https://github.com/deepbeepmeep/Wan2GP.git
          git fetch upstream
          
          # Force the 'upstream-main' branch to exactly match the author's main
          # This keeps a clean, un-customized copy of their code in your repo
          git push origin upstream/main:refs/heads/upstream-main --force

      - name: Merge Upstream into Main
        run: |
          git checkout main
          # Ensure local main matches remote before merging (prevents non-fast-forward push)
          git reset --hard origin/main

          # Save our versions of protected files before the merge
          for f in README.md uv.lock pyproject.toml DGXSPARK.md; do
            git show HEAD:"$f" > "/tmp/${f}.ours" 2>/dev/null || true
          done

          # Merge upstream; on conflict, take upstream's version for everything
          # (protected files are restored unconditionally below)
          if ! git merge origin/upstream-main --no-edit; then
            echo "Conflicts detected, auto-resolving in favor of upstream..."
            git checkout --theirs -- $(git diff --name-only --diff-filter=U)
            git add -A
            git commit --no-edit
          fi

          # Always restore our protected files regardless of whether there was a conflict
          changed=false
          for f in README.md uv.lock pyproject.toml DGXSPARK.md; do
            if [ -f "/tmp/${f}.ours" ] && ! diff -q "/tmp/${f}.ours" "$f" >/dev/null 2>&1; then
              cp "/tmp/${f}.ours" "$f"
              changed=true
            fi
          done

          if [ "$changed" = true ]; then
            git add README.md uv.lock pyproject.toml DGXSPARK.md
            git commit -m "chore: restore protected files after upstream sync"
          fi

      - name: Push Changes
        run: git push origin main
